<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe (3 Pieces + Move)</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --cell: #1f2937;
      --cell-hover: #374151;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #22c55e;
      --x-color: #60a5fa;
      --o-color: #f472b6;
      --selected: #f59e0b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #1e293b, var(--bg));
      color: var(--text);
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .game {
      width: min(420px, 95vw);
      background: var(--panel);
      border: 1px solid #2b3545;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.3rem;
    }

    .status {
      margin-bottom: 12px;
      color: var(--muted);
      min-height: 3.4em;
      line-height: 1.35;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .cell {
      aspect-ratio: 1 / 1;
      border: 1px solid #334155;
      border-radius: 10px;
      background: var(--cell);
      color: var(--text);
      font-size: clamp(2rem, 8vw, 3rem);
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .cell:hover {
      background: var(--cell-hover);
    }

    .cell.x {
      color: var(--x-color);
    }

    .cell.o {
      color: var(--o-color);
    }

    .cell.selected {
      border-color: var(--selected);
      box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.4) inset;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 9px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      background: #334155;
      color: white;
    }

    .winner-btn {
      background: var(--accent);
      color: #052e16;
      display: none;
    }

    .restart-btn {
      background: #475569;
      display: none;
    }
  </style>
</head>
<body>
  <main class="game">
    <h1>Tic-Tac-Toe (3 pieces each)</h1>
    <div id="status" class="status"></div>
    <section id="board" class="board" aria-label="3 by 3 board"></section>
    <div class="controls">
      <button id="winnerBtn" class="winner-btn" disabled></button>
      <button id="restartBtn" class="restart-btn">Restart</button>
    </div>
  </main>

  <script>
    const boardEl = document.getElementById("board");
    const statusEl = document.getElementById("status");
    const winnerBtn = document.getElementById("winnerBtn");
    const restartBtn = document.getElementById("restartBtn");

    const WIN_LINES = [
      [0, 1, 2], [3, 4, 5], [6, 7, 8], // rows
      [0, 3, 6], [1, 4, 7], [2, 5, 8], // columns
      [0, 4, 8], [2, 4, 6]             // diagonals
    ];

    const state = {
      board: Array(9).fill(null),
      current: "X",
      placed: { X: 0, O: 0 },
      selectedFrom: null,
      winner: null
    };

    function playerName(symbol) {
      return symbol === "X" ? "Player 1" : "Player 2";
    }

    function createBoard() {
      boardEl.innerHTML = "";
      for (let i = 0; i < 9; i += 1) {
        const btn = document.createElement("button");
        btn.className = "cell";
        btn.dataset.index = i;
        btn.addEventListener("click", () => onCellClick(i));
        boardEl.appendChild(btn);
      }
    }

    function getWinnerSymbol() {
      for (const [a, b, c] of WIN_LINES) {
        const v = state.board[a];
        if (v && v === state.board[b] && v === state.board[c]) {
          return v;
        }
      }
      return null;
    }

    function updateStatus() {
      if (state.winner) {
        statusEl.textContent = `${playerName(state.winner)} wins!`;
        return;
      }

      const currentName = playerName(state.current);
      const symbol = state.current;
      const used = state.placed[symbol];

      if (used < 3) {
        statusEl.textContent =
          `${currentName} (${symbol}) turn: place piece ${used + 1} of 3.`;
      } else if (state.selectedFrom === null) {
        statusEl.textContent =
          `${currentName} (${symbol}) turn: select one of your pieces to move.`;
      } else {
        statusEl.textContent =
          `${currentName} (${symbol}) selected a piece. Now click an empty square to move.`;
      }
    }

    function render() {
      const cells = boardEl.querySelectorAll(".cell");
      cells.forEach((cell, i) => {
        const val = state.board[i];
        cell.textContent = val ?? "";
        cell.classList.toggle("x", val === "X");
        cell.classList.toggle("o", val === "O");
        cell.classList.toggle("selected", state.selectedFrom === i);
      });

      if (state.winner) {
        winnerBtn.textContent = `${playerName(state.winner)} wins`;
        winnerBtn.style.display = "inline-block";
        restartBtn.style.display = "inline-block";
      } else {
        winnerBtn.style.display = "none";
        restartBtn.style.display = "none";
      }

      updateStatus();
    }

    function endTurnIfWinOrSwitch() {
      const w = getWinnerSymbol();
      if (w) {
        state.winner = w;
      } else {
        state.current = state.current === "X" ? "O" : "X";
      }
    }

    function onCellClick(index) {
      if (state.winner) {
        return;
      }

      const symbol = state.current;
      const cellValue = state.board[index];
      const hasPlacedAll = state.placed[symbol] >= 3;

      // Placement phase for this player: place until this player has 3 pieces.
      if (!hasPlacedAll) {
        if (cellValue !== null) {
          return;
        }
        state.board[index] = symbol;
        state.placed[symbol] += 1;
        endTurnIfWinOrSwitch();
        render();
        return;
      }

      // Movement phase: select own piece, then move it to an empty cell.
      if (state.selectedFrom === null) {
        if (cellValue === symbol) {
          state.selectedFrom = index;
        }
        render();
        return;
      }

      // Deselect if clicking same piece.
      if (state.selectedFrom === index) {
        state.selectedFrom = null;
        render();
        return;
      }

      // Allow reselecting another own piece.
      if (cellValue === symbol) {
        state.selectedFrom = index;
        render();
        return;
      }

      // Move selected piece to empty square.
      if (cellValue === null) {
        state.board[state.selectedFrom] = null;
        state.board[index] = symbol;
        state.selectedFrom = null;
        endTurnIfWinOrSwitch();
        render();
      }
    }

    function restart() {
      state.board = Array(9).fill(null);
      state.current = "X";
      state.placed = { X: 0, O: 0 };
      state.selectedFrom = null;
      state.winner = null;
      render();
    }

    restartBtn.addEventListener("click", restart);

    createBoard();
    render();
  </script>
</body>
</html>
