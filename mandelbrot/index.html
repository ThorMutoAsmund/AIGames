<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mandelbrot Zoomer</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #1e293b, var(--bg));
      color: var(--text);
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .app {
      width: min(980px, 96vw);
      background: var(--panel);
      border: 1px solid #2b3545;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.25rem;
    }

    .hint {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.35;
    }

    canvas {
      width: 100%;
      height: auto;
      aspect-ratio: 16 / 10;
      display: block;
      border: 1px solid #334155;
      border-radius: 10px;
      background: #000;
      image-rendering: pixelated;
      cursor: crosshair;
    }

    .controls {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .meta {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.4;
      font-variant-numeric: tabular-nums;
    }

    button {
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #334155, #475569);
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.45);
    }

    button:hover {
      filter: brightness(1.05);
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>Mandelbrot Zoomer</h1>
    <p class="hint">Scroll wheel to zoom at mouse position. Use Reset to go back.</p>
    <canvas id="view" width="960" height="600" aria-label="Mandelbrot renderer"></canvas>
    <div id="meta" class="meta"></div>
    <div class="controls">
      <button id="resetBtn">Reset</button>
      <button id="randomBtn">Randomize Colors</button>
    </div>
  </main>

  <script>
    const INITIAL_CENTER_X = -0.5;
    const INITIAL_CENTER_Y = 0.0;
    const INITIAL_SPAN_X = 3.2;

    const canvas = document.getElementById("view");
    const ctx = canvas.getContext("2d");
    const resetBtn = document.getElementById("resetBtn");
    const randomBtn = document.getElementById("randomBtn");
    const metaEl = document.getElementById("meta");
    const tempCanvas = document.createElement("canvas");
    const tempCtx = tempCanvas.getContext("2d");
    const previewCanvas = document.createElement("canvas");
    const previewCtx = previewCanvas.getContext("2d");

    let centerX = INITIAL_CENTER_X;
    let centerY = INITIAL_CENTER_Y;
    let spanX = INITIAL_SPAN_X;
    let palette = [];
    let renderToken = 0;
    let fullRenderTimer = null;
    let aaTimer = null;

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function hslToRgb(h, s, l) {
      const a = s * Math.min(l, 1 - l);
      function f(n) {
        const k = (n + h * 12) % 12;
        return l - a * Math.max(-1, Math.min(k - 3, Math.min(9 - k, 1)));
      }
      return [Math.round(f(0) * 255), Math.round(f(8) * 255), Math.round(f(4) * 255)];
    }

    function randomGradientStops() {
      const stops = [];
      const count = 4 + Math.floor(Math.random() * 3); // 4..6 stops
      for (let i = 0; i < count; i += 1) {
        stops.push({
          t: i / (count - 1),
          rgb: hslToRgb(Math.random(), 0.65 + Math.random() * 0.25, 0.35 + Math.random() * 0.3)
        });
      }
      return stops;
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function buildPalette(size = 768) {
      const stops = randomGradientStops();
      const out = new Array(size);
      for (let i = 0; i < size; i += 1) {
        const t = i / (size - 1);
        let j = 0;
        while (j < stops.length - 2 && t > stops[j + 1].t) {
          j += 1;
        }
        const left = stops[j];
        const right = stops[j + 1];
        const range = right.t - left.t || 1;
        const localT = clamp((t - left.t) / range, 0, 1);
        out[i] = [
          Math.round(lerp(left.rgb[0], right.rgb[0], localT)),
          Math.round(lerp(left.rgb[1], right.rgb[1], localT)),
          Math.round(lerp(left.rgb[2], right.rgb[2], localT))
        ];
      }
      return out;
    }

    function canvasToComplex(px, py, width, height) {
      const spanY = spanX * (height / width);
      return {
        x: centerX + (px / width - 0.5) * spanX,
        y: centerY + (py / height - 0.5) * spanY
      };
    }

    function maxIterations() {
      const zoomFactor = INITIAL_SPAN_X / spanX;
      return clamp(Math.floor(90 + Math.log10(zoomFactor + 1) * 80), 90, 800);
    }

    function updateMeta() {
      const zoom = INITIAL_SPAN_X / spanX;
      const iter = maxIterations();
      metaEl.textContent = `Center: (${centerX.toFixed(12)}, ${centerY.toFixed(12)})  |  Zoom: ${zoom.toFixed(2)}x  |  Max iterations: ${iter}`;
    }

    function showZoomPreview(px, py, factor) {
      const width = canvas.width;
      const height = canvas.height;
      if (width < 2 || height < 2) {
        return;
      }
      const scale = 1 / factor;
      previewCanvas.width = width;
      previewCanvas.height = height;
      previewCtx.drawImage(canvas, 0, 0);
      const drawW = width * scale;
      const drawH = height * scale;
      const dx = px - px * scale;
      const dy = py - py * scale;
      ctx.imageSmoothingEnabled = false;
      ctx.clearRect(0, 0, width, height);
      ctx.drawImage(previewCanvas, 0, 0, width, height, dx, dy, drawW, drawH);
    }

    function renderMandelbrotImageAsync(renderW, renderH, maxIter, token, onDone, rowsPerChunk = 6) {
      if (token !== renderToken) {
        return;
      }
      const width = canvas.width;
      const height = canvas.height;
      const xStep = spanX / renderW;
      const spanY = spanX * (height / width);
      const yStep = spanY / renderH;
      const xStart = centerX - spanX * 0.5;
      const yStart = centerY - spanY * 0.5;
      const image = tempCtx.createImageData(renderW, renderH);
      const data = image.data;
      const log2 = Math.log(2);
      let py = 0;

      function renderChunk() {
        if (token !== renderToken) {
          return;
        }
        const yEnd = Math.min(renderH, py + rowsPerChunk);
        for (; py < yEnd; py += 1) {
          const cy = yStart + py * yStep;
          let cx = xStart;
          for (let px = 0; px < renderW; px += 1) {
            let x = 0;
            let y = 0;
            let iter = 0;

            while (x * x + y * y <= 4 && iter < maxIter) {
              const xx = x * x - y * y + cx;
              y = 2 * x * y + cy;
              x = xx;
              iter += 1;
            }

            const i = (py * renderW + px) * 4;
            if (iter >= maxIter) {
              data[i] = 0;
              data[i + 1] = 0;
              data[i + 2] = 0;
              data[i + 3] = 255;
              cx += xStep;
              continue;
            }

            const mag2 = x * x + y * y;
            const smooth = iter + 1 - Math.log(Math.log(Math.max(mag2, 1e-9))) / log2;
            const idx = Math.abs(Math.floor(smooth * 6)) % palette.length;
            const color = palette[idx];
            data[i] = color[0];
            data[i + 1] = color[1];
            data[i + 2] = color[2];
            data[i + 3] = 255;
            cx += xStep;
          }
        }

        if (py < renderH) {
          setTimeout(renderChunk, 0);
          return;
        }
        if (token !== renderToken) {
          return;
        }
        onDone(image);
      }

      renderChunk();
    }

    function downsample2xAsync(superImage, outW, outH, token, onDone, rowsPerChunk = 8) {
      if (token !== renderToken) {
        return;
      }
      const src = superImage.data;
      const superW = superImage.width;
      const dstImage = ctx.createImageData(outW, outH);
      const dst = dstImage.data;
      let y = 0;

      function chunk() {
        if (token !== renderToken) {
          return;
        }
        const yEnd = Math.min(outH, y + rowsPerChunk);
        for (; y < yEnd; y += 1) {
          for (let x = 0; x < outW; x += 1) {
            const i = (y * outW + x) * 4;
            const s = ((y * 2) * superW + (x * 2)) * 4;
            const iRight = s + 4;
            const iDown = s + superW * 4;
            const iDiag = iDown + 4;
            dst[i] = (src[s] + src[iRight] + src[iDown] + src[iDiag]) >> 2;
            dst[i + 1] = (src[s + 1] + src[iRight + 1] + src[iDown + 1] + src[iDiag + 1]) >> 2;
            dst[i + 2] = (src[s + 2] + src[iRight + 2] + src[iDown + 2] + src[iDiag + 2]) >> 2;
            dst[i + 3] = 255;
          }
        }
        if (y < outH) {
          setTimeout(chunk, 0);
          return;
        }
        if (token !== renderToken) {
          return;
        }
        onDone(dstImage);
      }

      chunk();
    }

    function renderAtScale(scale, token, onDone) {
      if (token !== renderToken) {
        return;
      }
      const width = canvas.width;
      const height = canvas.height;
      const renderW = Math.max(1, Math.floor(width * scale));
      const renderH = Math.max(1, Math.floor(height * scale));
      renderMandelbrotImageAsync(renderW, renderH, maxIterations(), token, (image) => {
        if (token !== renderToken) {
          return;
        }
        tempCanvas.width = renderW;
        tempCanvas.height = renderH;
        tempCtx.putImageData(image, 0, 0);
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(tempCanvas, 0, 0, renderW, renderH, 0, 0, width, height);
        if (onDone) {
          onDone();
        }
      });
    }

    function renderSupersampledAntialias(token) {
      if (token !== renderToken) {
        return;
      }
      const width = canvas.width;
      const height = canvas.height;
      const superW = width * 2;
      const superH = height * 2;
      renderMandelbrotImageAsync(
        superW,
        superH,
        clamp(Math.floor(maxIterations() * 1.2), 120, 1400),
        token,
        (superImage) => {
          if (token !== renderToken) {
            return;
          }
          downsample2xAsync(superImage, width, height, token, (dstImage) => {
            if (token !== renderToken) {
              return;
            }
            ctx.putImageData(dstImage, 0, 0);
          }, 12);
        },
        2
      );
    }

    function scheduleRender() {
      renderToken += 1;
      const token = renderToken;
      updateMeta();
      if (fullRenderTimer !== null) {
        clearTimeout(fullRenderTimer);
        fullRenderTimer = null;
      }
      if (aaTimer !== null) {
        clearTimeout(aaTimer);
        aaTimer = null;
      }
      renderAtScale(0.5, token, () => {
        if (token !== renderToken) {
          return;
        }
        fullRenderTimer = setTimeout(() => {
          fullRenderTimer = null;
          renderAtScale(1, token, () => {
            if (token !== renderToken) {
              return;
            }
            if (aaTimer !== null) {
              clearTimeout(aaTimer);
              aaTimer = null;
            }
            aaTimer = setTimeout(() => {
              aaTimer = null;
              renderSupersampledAntialias(token);
            }, 0);
          });
        }, 0);
      });
    }

    function resetView() {
      centerX = INITIAL_CENTER_X;
      centerY = INITIAL_CENTER_Y;
      spanX = INITIAL_SPAN_X;
      scheduleRender();
    }

    function resizeCanvasForDisplay() {
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      const targetW = Math.max(1, Math.round(rect.width * dpr));
      const targetH = Math.max(1, Math.round(rect.height * dpr));
      if (canvas.width !== targetW || canvas.height !== targetH) {
        canvas.width = targetW;
        canvas.height = targetH;
        scheduleRender();
      }
    }

    canvas.addEventListener("wheel", (event) => {
      event.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const px = (event.clientX - rect.left) * dpr;
      const py = (event.clientY - rect.top) * dpr;

      const before = canvasToComplex(px, py, canvas.width, canvas.height);
      const factor = event.deltaY < 0 ? 0.82 : 1.22;
      showZoomPreview(px, py, factor);
      const newSpanX = clamp(spanX * factor, 1e-12, INITIAL_SPAN_X);
      const newSpanY = newSpanX * (canvas.height / canvas.width);
      const u = px / canvas.width;
      const v = py / canvas.height;

      centerX = before.x - (u - 0.5) * newSpanX;
      centerY = before.y - (v - 0.5) * newSpanY;
      spanX = newSpanX;

      scheduleRender();
    }, { passive: false });

    resetBtn.addEventListener("click", resetView);
    randomBtn.addEventListener("click", () => {
      palette = buildPalette();
      scheduleRender();
    });

    window.addEventListener("resize", resizeCanvasForDisplay);

    palette = buildPalette();
    resizeCanvasForDisplay();
    resetView();
  </script>
</body>
</html>
