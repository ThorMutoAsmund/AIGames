<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ormespil (Snake)</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --cell: #1f2937;
      --cell-hover: #374151;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #22c55e;
      --danger: #ef4444;
      --food: #f59e0b;
      --snake: #60a5fa;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #1e293b, var(--bg));
      color: var(--text);
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .game {
      width: min(900px, 96vw);
      background: var(--panel);
      border: 1px solid #2b3545;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
      position: relative;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.3rem;
    }

    .status {
      margin-bottom: 10px;
      color: var(--muted);
      min-height: 2.8em;
      line-height: 1.35;
    }

    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .score {
      color: var(--accent);
    }

    .best {
      color: #c4b5fd;
    }

    .play-layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 12px;
      align-items: stretch;
    }

    .board-wrap {
      min-width: 0;
    }

    canvas {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: block;
      background: var(--cell);
      border: 1px solid #334155;
      border-radius: 10px;
      image-rendering: pixelated;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    button {
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 10px 18px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      background: linear-gradient(135deg, #334155, #475569);
      color: white;
      transition:
        transform 120ms ease,
        box-shadow 160ms ease,
        filter 160ms ease,
        border-color 160ms ease;
      box-shadow:
        0 8px 18px rgba(15, 23, 42, 0.45),
        0 0 0 1px rgba(148, 163, 184, 0.18);
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
      box-shadow:
        0 12px 24px rgba(15, 23, 42, 0.55),
        0 0 0 1px rgba(148, 163, 184, 0.24);
    }

    button:active {
      transform: translateY(0);
      box-shadow:
        0 6px 14px rgba(15, 23, 42, 0.45),
        0 0 0 1px rgba(148, 163, 184, 0.2);
    }

    .start-btn {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #052e16;
      border-color: rgba(134, 239, 172, 0.45);
      box-shadow:
        0 10px 22px rgba(22, 163, 74, 0.35),
        0 0 0 1px rgba(21, 128, 61, 0.35);
    }

    .restart-btn {
      background: linear-gradient(135deg, #475569, #334155);
      border-color: rgba(148, 163, 184, 0.35);
    }

    .dead {
      color: var(--danger);
      font-weight: 700;
    }

    .leaderboard {
      margin-top: 14px;
      border: 1px solid #334155;
      border-radius: 10px;
      background: #0b1220;
      padding: 10px 12px;
    }

    .leaderboard h2 {
      margin: 0 0 8px;
      font-size: 0.95rem;
      color: #c4b5fd;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .leaderboard-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 5px;
    }

    .leaderboard-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.92rem;
      color: #dbeafe;
      font-variant-numeric: tabular-nums;
    }

    .leaderboard-empty {
      color: #94a3b8;
      font-size: 0.9rem;
    }

    .chat {
      border: 1px solid #334155;
      border-radius: 10px;
      background: #0b1220;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      margin: 0;
      padding: 10px 12px 8px;
      font-size: 0.9rem;
      color: #a5f3fc;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border-bottom: 1px solid #1e293b;
    }

    .chat-messages {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 6px;
    }

    .chat-message {
      font-size: 0.9rem;
      color: #e2e8f0;
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 8px;
      padding: 6px 8px;
      word-break: break-word;
      white-space: pre-wrap;
      line-height: 1.35;
    }

    .chat-empty {
      color: #94a3b8;
      font-size: 0.87rem;
    }

    .chat-form {
      border-top: 1px solid #1e293b;
      padding: 8px;
      display: flex;
      gap: 6px;
    }

    .chat-input {
      flex: 1;
      border-radius: 8px;
      border: 1px solid #475569;
      background: #111827;
      color: #e2e8f0;
      font-size: 0.9rem;
      padding: 8px 9px;
      outline: none;
    }

    .chat-input:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
    }

    .chat-send {
      border-radius: 8px;
      text-transform: none;
      letter-spacing: 0.02em;
      padding: 8px 10px;
      font-size: 0.85rem;
      background: linear-gradient(135deg, #06b6d4, #0284c7);
      color: #e0f2fe;
    }

    @media (max-width: 860px) {
      .play-layout {
        grid-template-columns: 1fr;
      }
      .chat {
        max-height: 260px;
      }
    }

    .name-modal {
      position: absolute;
      inset: 0;
      border-radius: 14px;
      background: rgba(2, 6, 23, 0.72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 5;
    }

    .name-modal.show {
      display: flex;
    }

    .name-modal-card {
      width: min(360px, 100%);
      background: #0b1220;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 14px 35px rgba(0, 0, 0, 0.45);
    }

    .name-modal-title {
      margin: 0 0 6px;
      color: #c4b5fd;
      font-size: 1.05rem;
      font-weight: 700;
    }

    .name-modal-text {
      margin: 0 0 10px;
      color: #cbd5e1;
      font-size: 0.92rem;
      line-height: 1.4;
    }

    .name-modal-input {
      width: 100%;
      border-radius: 8px;
      border: 1px solid #475569;
      background: #111827;
      color: #e2e8f0;
      font-size: 1rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 10px 11px;
      outline: none;
    }

    .name-modal-input:focus {
      border-color: #818cf8;
      box-shadow: 0 0 0 2px rgba(129, 140, 248, 0.25);
    }

    .name-modal-error {
      min-height: 1.2em;
      margin-top: 7px;
      font-size: 0.84rem;
      color: #fca5a5;
    }

    .name-modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 8px;
    }

    .modal-btn {
      border-radius: 8px;
      text-transform: none;
      letter-spacing: 0.02em;
      padding: 8px 12px;
      font-size: 0.88rem;
    }

    .modal-btn-save {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #052e16;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      filter: grayscale(0.2);
      transform: none;
      box-shadow:
        0 6px 12px rgba(15, 23, 42, 0.3),
        0 0 0 1px rgba(148, 163, 184, 0.12);
    }
  </style>
</head>
<body>
  <main class="game">
    <h1>Ormespil (Snake)</h1>
    <div id="status" class="status">
      Use Arrow keys or WASD. Eat dots to grow. Do not hit walls or yourself.
    </div>

    <div class="hud">
      <div class="score">Score: <span id="score">0</span></div>
      <div class="best">Best: <span id="best">0</span></div>
    </div>

    <div class="play-layout">
      <div class="board-wrap">
        <canvas id="board" width="400" height="400" aria-label="Snake board"></canvas>
      </div>
      <aside class="chat" aria-label="Game chat">
        <h2 class="chat-header">Global chat</h2>
        <div id="chatMessages" class="chat-messages">
          <div class="chat-empty">Loading chat...</div>
        </div>
        <form id="chatForm" class="chat-form">
          <input id="chatInput" class="chat-input" type="text" maxlength="120" placeholder="Write a message..." autocomplete="off" />
          <button class="chat-send" type="submit">Send</button>
        </form>
      </aside>
    </div>

    <div class="controls">
      <button id="startBtn" class="start-btn">Start</button>
      <button id="restartBtn" class="restart-btn">Restart</button>
    </div>

    <section class="leaderboard" aria-live="polite">
      <h2>Global leaderboard</h2>
      <ul id="leaderboardList" class="leaderboard-list">
        <li class="leaderboard-empty">Loading...</li>
      </ul>
    </section>

    <div id="nameModal" class="name-modal" role="dialog" aria-modal="true" aria-labelledby="nameModalTitle">
      <div class="name-modal-card">
        <h3 id="nameModalTitle" class="name-modal-title">Leaderboard entry</h3>
        <p class="name-modal-text">You made top 10. Enter a name (1-6 letters):</p>
        <input id="nameModalInput" class="name-modal-input" type="text" maxlength="6" autocomplete="off" />
        <div id="nameModalError" class="name-modal-error"></div>
        <div class="name-modal-actions">
          <button id="nameModalCancel" class="modal-btn">Skip</button>
          <button id="nameModalSave" class="modal-btn modal-btn-save">Save</button>
        </div>
      </div>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
  <script src="./firebase-config.js"></script>
  <script>
    const GRID_SIZE = 20;
    const STEP_MS = 120;
    const SPECIAL_FOOD_SPAWN_CHANCE = 0.16;

    const canvas = document.getElementById("board");
    const ctx = canvas.getContext("2d");
    const statusEl = document.getElementById("status");
    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const startBtn = document.getElementById("startBtn");
    const restartBtn = document.getElementById("restartBtn");
    const leaderboardListEl = document.getElementById("leaderboardList");
    const chatMessagesEl = document.getElementById("chatMessages");
    const chatFormEl = document.getElementById("chatForm");
    const chatInputEl = document.getElementById("chatInput");
    const nameModalEl = document.getElementById("nameModal");
    const nameModalInputEl = document.getElementById("nameModalInput");
    const nameModalErrorEl = document.getElementById("nameModalError");
    const nameModalCancelEl = document.getElementById("nameModalCancel");
    const nameModalSaveEl = document.getElementById("nameModalSave");

    let snake;
    let dir;
    let directionQueue;
    let food;
    let score;
    let best;
    let running;
    let isGameOver;
    let explosionParticles;
    let specialFood;
    let timer;
    let firebaseLeaderboardRef;
    let firebaseChatRef;
    let leaderboardEntries;
    let chatMessages;
    let pendingLeaderboardPromptTimer;
    let leaderboardPromptOpen;

    function setupGame() {
      const center = Math.floor(GRID_SIZE / 2);
      snake = [
        { x: center - 1, y: center },
        { x: center - 2, y: center },
        { x: center - 3, y: center }
      ];
      dir = { x: 1, y: 0 };
      directionQueue = [];
      food = spawnFood();
      score = 0;
      running = false;
      isGameOver = false;
      explosionParticles = [];
      specialFood = null;
      if (pendingLeaderboardPromptTimer) {
        clearTimeout(pendingLeaderboardPromptTimer);
        pendingLeaderboardPromptTimer = null;
      }
      closeLeaderboardModal();
      if (timer) {
        clearInterval(timer);
        timer = null;
      }
      updateHud();
      statusEl.textContent = "Press Start, then use Arrow keys or WASD.";
      statusEl.classList.remove("dead");
      startBtn.disabled = false;
      draw();
    }

    function updateHud() {
      scoreEl.textContent = String(score);
      bestEl.textContent = String(best);
    }

    function renderChatMessages() {
      if (!chatMessagesEl) {
        return;
      }
      if (chatMessages.length === 0) {
        chatMessagesEl.innerHTML = '<div class="chat-empty">No messages yet.</div>';
        return;
      }
      chatMessagesEl.innerHTML = chatMessages
        .map((msg) => {
          const text = String(msg.text || "").trim();
          if (!text) {
            return "";
          }
          return `<div class="chat-message">${text}</div>`;
        })
        .join("");
      chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
    }

    async function submitChatMessage(rawText) {
      const trimmed = rawText.trim();
      if (!trimmed) {
        return;
      }
      if (!firebaseChatRef) {
        statusEl.textContent = "Chat unavailable (check Firebase permissions/rules).";
        return;
      }
      try {
        await firebaseChatRef.push({
          text: trimmed,
          createdAt: Date.now()
        });
      } catch (err) {
        console.error("Failed to send chat message.", err);
        statusEl.textContent = "Could not send chat message (check Firebase rules).";
      }
    }

    function renderLeaderboard() {
      if (!leaderboardListEl) {
        return;
      }
      if (leaderboardEntries.length === 0) {
        leaderboardListEl.innerHTML = '<li class="leaderboard-empty">No scores yet.</li>';
        return;
      }

      leaderboardListEl.innerHTML = leaderboardEntries
        .slice(0, 10)
        .map((entry, index) => {
          const safeName = String(entry.name || "UNKNOWN").toUpperCase().slice(0, 6);
          const safeScore = Number(entry.score || 0);
          return `
            <li class="leaderboard-row">
              <span>#${index + 1} ${safeName}</span>
              <span>${safeScore}</span>
            </li>
          `;
        })
        .join("");
    }

    function closeLeaderboardModal() {
      leaderboardPromptOpen = false;
      nameModalEl.classList.remove("show");
      nameModalInputEl.value = "";
      nameModalErrorEl.textContent = "";
    }

    function openLeaderboardModal() {
      leaderboardPromptOpen = true;
      nameModalEl.classList.add("show");
      nameModalErrorEl.textContent = "";
      nameModalInputEl.value = "";
      nameModalInputEl.focus();

      return new Promise((resolve) => {
        const cleanup = () => {
          nameModalSaveEl.removeEventListener("click", handleSave);
          nameModalCancelEl.removeEventListener("click", handleCancel);
          nameModalInputEl.removeEventListener("keydown", handleKeyDown);
          nameModalInputEl.removeEventListener("input", handleInput);
        };

        const finish = (value) => {
          cleanup();
          closeLeaderboardModal();
          resolve(value);
        };

        const handleInput = () => {
          const cleaned = nameModalInputEl.value.toUpperCase().replace(/[^A-Z]/g, "");
          if (cleaned !== nameModalInputEl.value) {
            nameModalInputEl.value = cleaned;
          }
        };

        const handleSave = () => {
          const cleaned = nameModalInputEl.value.trim().toUpperCase().replace(/[^A-Z]/g, "");
          if (!/^[A-Z]{1,6}$/.test(cleaned)) {
            nameModalErrorEl.textContent = "Use 1 to 6 letters (A-Z).";
            return;
          }
          finish(cleaned);
        };

        const handleCancel = () => {
          finish(null);
        };

        const handleKeyDown = (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            handleSave();
          }
          if (event.key === "Escape") {
            event.preventDefault();
            handleCancel();
          }
        };

        nameModalSaveEl.addEventListener("click", handleSave);
        nameModalCancelEl.addEventListener("click", handleCancel);
        nameModalInputEl.addEventListener("keydown", handleKeyDown);
        nameModalInputEl.addEventListener("input", handleInput);
      });
    }

    function qualifiesForLeaderboard(scoreValue) {
      if (scoreValue <= 0) {
        return false;
      }
      if (leaderboardEntries.length < 10) {
        return true;
      }
      const lowestTopScore = Number(leaderboardEntries[leaderboardEntries.length - 1].score || 0);
      return scoreValue >= lowestTopScore;
    }

    async function trimLeaderboardToTopTen() {
      if (!firebaseLeaderboardRef) {
        return;
      }
      const snapshot = await firebaseLeaderboardRef.once("value");
      const rows = [];
      snapshot.forEach((child) => {
        rows.push({
          key: child.key,
          name: child.child("name").val(),
          score: Number(child.child("score").val() || 0),
          createdAt: Number(child.child("createdAt").val() || 0)
        });
      });

      rows.sort((a, b) => {
        const scoreDiff = b.score - a.score;
        if (scoreDiff !== 0) {
          return scoreDiff;
        }
        const createdDiff = a.createdAt - b.createdAt;
        if (createdDiff !== 0) {
          return createdDiff;
        }
        return String(a.key).localeCompare(String(b.key));
      });

      const rowsToRemove = rows.slice(10);
      await Promise.all(
        rowsToRemove.map((entry) => firebaseLeaderboardRef.child(entry.key).remove())
      );
    }

    async function submitLeaderboardEntry(scoreValue) {
      if (!firebaseLeaderboardRef || scoreValue <= 0) {
        return;
      }

      const playerName = await openLeaderboardModal();
      if (!playerName) {
        return;
      }

      try {
        await firebaseLeaderboardRef.push({
          name: playerName,
          score: scoreValue,
          createdAt: Date.now()
        });
        await trimLeaderboardToTopTen();
        statusEl.textContent = `Leaderboard saved for ${playerName}.`;
      } catch (err) {
        console.error("Failed to save leaderboard entry.", err);
        const reason = err && err.message ? ` (${err.message})` : "";
        statusEl.textContent = `Could not save leaderboard entry${reason}`;
      }
    }

    function loadLocalBest() {
      return Number(localStorage.getItem("snakeBestScore") || "0");
    }

    function saveLocalBest(value) {
      localStorage.setItem("snakeBestScore", String(value));
    }

    async function initializeBestScore() {
      best = loadLocalBest();
      updateHud();

      const canUseFirebase =
        typeof window.firebase !== "undefined" &&
        window.FIREBASE_CONFIG &&
        typeof window.FIREBASE_CONFIG === "object" &&
        window.FIREBASE_CONFIG.apiKey;

      if (!canUseFirebase) {
        return;
      }

      try {
        if (firebase.apps.length === 0) {
          firebase.initializeApp(window.FIREBASE_CONFIG);
        }
        const db = firebase.database();
        firebaseLeaderboardRef = db.ref("scores/ormespil/leaderboard");
        firebaseChatRef = db.ref("scores/ormespil/chat/messages");

        firebaseLeaderboardRef
          .orderByChild("score")
          .limitToLast(10)
          .on("value", (snap) => {
            const rows = [];
            snap.forEach((child) => {
              rows.push(child.val());
            });
            rows.sort((a, b) => {
              const scoreDiff = Number(b.score || 0) - Number(a.score || 0);
              if (scoreDiff !== 0) {
                return scoreDiff;
              }
              return Number(a.createdAt || 0) - Number(b.createdAt || 0);
            });
            leaderboardEntries = rows;
            renderLeaderboard();
          }, (err) => {
            console.error("Failed to load leaderboard from Firebase.", err);
            leaderboardEntries = [];
            renderLeaderboard();
            statusEl.textContent = "Firebase leaderboard unavailable (permissions/rules).";
          });

        firebaseChatRef
          .orderByChild("createdAt")
          .limitToLast(120)
          .on("value", (snap) => {
            const rows = [];
            snap.forEach((child) => {
              rows.push({
                key: child.key,
                text: child.child("text").val(),
                createdAt: Number(child.child("createdAt").val() || 0)
              });
            });
            rows.sort((a, b) => {
              const timeDiff = Number(a.createdAt || 0) - Number(b.createdAt || 0);
              if (timeDiff !== 0) {
                return timeDiff;
              }
              return String(a.key).localeCompare(String(b.key));
            });
            chatMessages = rows;
            renderChatMessages();
          }, (err) => {
            console.error("Failed to load chat messages from Firebase.", err);
            chatMessages = [];
            renderChatMessages();
            statusEl.textContent = "Firebase chat unavailable (permissions/rules).";
          });
      } catch (err) {
        console.error("Firebase leaderboard unavailable, using local storage for best.", err);
        best = loadLocalBest();
        firebaseLeaderboardRef = null;
        firebaseChatRef = null;
        leaderboardEntries = [];
        chatMessages = [];
        renderLeaderboard();
        renderChatMessages();
        updateHud();
      }
    }

    function updateBest(candidateScore) {
      if (candidateScore <= best) {
        return;
      }
      best = candidateScore;
      saveLocalBest(best);
      updateHud();
    }

    function spawnFood() {
      while (true) {
        const candidate = {
          x: Math.floor(Math.random() * GRID_SIZE),
          y: Math.floor(Math.random() * GRID_SIZE)
        };
        const onSnake = snake && snake.some((part) => part.x === candidate.x && part.y === candidate.y);
        const overlapsSpecial =
          specialFood &&
          specialFood.active &&
          candidate.x === specialFood.x &&
          candidate.y === specialFood.y;
        if (!onSnake && !overlapsSpecial) {
          return candidate;
        }
      }
    }

    function updateSpecialFoodPosition() {
      if (!specialFood || !specialFood.active) {
        return;
      }
      const fx = specialFood.originX + Math.cos(specialFood.angle) * specialFood.radius;
      const fy = specialFood.originY + Math.sin(specialFood.angle) * specialFood.radius;
      specialFood.fx = fx;
      specialFood.fy = fy;
      specialFood.x = Math.max(0, Math.min(GRID_SIZE - 1, Math.round(fx)));
      specialFood.y = Math.max(0, Math.min(GRID_SIZE - 1, Math.round(fy)));
    }

    function spawnSpecialFood() {
      if (specialFood && specialFood.active) {
        return;
      }
      const center = (GRID_SIZE - 1) / 2;
      specialFood = {
        active: true,
        originX: center,
        originY: center,
        angle: Math.random() * Math.PI * 2,
        radius: 0.6,
        radialSpeed: 0.12,
        angularSpeed: 0.45,
        x: center,
        y: center,
        fx: center,
        fy: center
      };
      updateSpecialFoodPosition();
    }

    function advanceSpecialFood() {
      if (!specialFood || !specialFood.active) {
        return;
      }
      specialFood.angle += specialFood.angularSpeed;
      specialFood.radius += specialFood.radialSpeed;
      updateSpecialFoodPosition();

      const waterEdge = 0;
      if (
        specialFood.fx < waterEdge ||
        specialFood.fy < waterEdge ||
        specialFood.fx > GRID_SIZE - 1 - waterEdge ||
        specialFood.fy > GRID_SIZE - 1 - waterEdge
      ) {
        specialFood.active = false;
      }
    }

    function tryCollectSpecialFood(head) {
      if (!specialFood || !specialFood.active) {
        return false;
      }
      const dx = Math.abs(head.x - specialFood.x);
      const dy = Math.abs(head.y - specialFood.y);
      const caught = dx <= 1 && dy <= 1;
      if (!caught) {
        return false;
      }
      specialFood.active = false;
      score += 5;
      updateBest(score);
      statusEl.textContent = "Special spiral dot caught! +5 points.";
      return true;
    }

    function sameCell(a, b) {
      return a.x === b.x && a.y === b.y;
    }

    function tick() {
      if (!running || isGameOver) {
        return;
      }
      while (directionQueue.length > 0) {
        const candidate = directionQueue.shift();
        const reversing = dir.x === -candidate.x && dir.y === -candidate.y;
        if (!reversing) {
          dir = candidate;
          break;
        }
      }
      advanceSpecialFood();
      const head = snake[0];
      const newHead = { x: head.x + dir.x, y: head.y + dir.y };

      const hitWall =
        newHead.x < 0 ||
        newHead.y < 0 ||
        newHead.x >= GRID_SIZE ||
        newHead.y >= GRID_SIZE;

      if (hitWall) {
        gameOver(head);
        return;
      }

      const hitSelf = snake.some((part) => sameCell(part, newHead));
      if (hitSelf) {
        gameOver(newHead);
        return;
      }

      snake.unshift(newHead);

      let ateNormalFood = false;
      if (sameCell(newHead, food)) {
        score += 1;
        updateBest(score);
        food = spawnFood();
        ateNormalFood = true;
      } else {
        snake.pop();
      }
      tryCollectSpecialFood(newHead);
      if (ateNormalFood && (!specialFood || !specialFood.active) && Math.random() < SPECIAL_FOOD_SPAWN_CHANCE) {
        spawnSpecialFood();
      }

      updateHud();
      draw();
    }

    function drawCell(x, y, color, inset = 2) {
      const size = canvas.width / GRID_SIZE;
      ctx.fillStyle = color;
      ctx.fillRect(x * size + inset, y * size + inset, size - inset * 2, size - inset * 2);
    }

    function drawGrid() {
      const size = canvas.width / GRID_SIZE;
      ctx.fillStyle = "#1f2937";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = "rgba(56, 189, 248, 0.55)";
      ctx.lineWidth = 3;
      ctx.strokeRect(1.5, 1.5, canvas.width - 3, canvas.height - 3);
      ctx.strokeStyle = "#334155";
      ctx.lineWidth = 1;
      for (let i = 0; i <= GRID_SIZE; i += 1) {
        const p = i * size;
        ctx.beginPath();
        ctx.moveTo(p, 0);
        ctx.lineTo(p, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, p);
        ctx.lineTo(canvas.width, p);
        ctx.stroke();
      }
    }

    function draw() {
      drawGrid();
      drawCell(food.x, food.y, "#f59e0b", 4);
      if (specialFood && specialFood.active) {
        drawCell(specialFood.x, specialFood.y, "#a78bfa", 4);
      }
      for (let i = snake.length - 1; i >= 0; i -= 1) {
        const part = snake[i];
        const isHead = i === 0;
        drawCell(part.x, part.y, isHead ? "#93c5fd" : "#60a5fa", 3);
      }
      if (explosionParticles && explosionParticles.length > 0) {
        const size = canvas.width / GRID_SIZE;
        explosionParticles.forEach((particle) => {
          ctx.fillStyle = particle.color;
          ctx.beginPath();
          ctx.arc(
            particle.x * size + size / 2,
            particle.y * size + size / 2,
            size * particle.radius,
            0,
            Math.PI * 2
          );
          ctx.fill();
        });
      }
    }

    function startGame() {
      if (running || isGameOver) return;
      running = true;
      statusEl.textContent = "Keep going. Eat dots and avoid walls and your own tail.";
      timer = setInterval(tick, STEP_MS);
    }

    function gameOver(point) {
      running = false;
      isGameOver = true;
      if (timer) {
        clearInterval(timer);
        timer = null;
      }
      const center = {
        x: Math.max(0, Math.min(GRID_SIZE - 1, point.x)),
        y: Math.max(0, Math.min(GRID_SIZE - 1, point.y))
      };
      explosionParticles = [
        { x: center.x, y: center.y, color: "#f97316", radius: 0.34 },
        { x: center.x - 0.35, y: center.y, color: "#ef4444", radius: 0.24 },
        { x: center.x + 0.35, y: center.y, color: "#ef4444", radius: 0.24 },
        { x: center.x, y: center.y - 0.35, color: "#fb7185", radius: 0.2 },
        { x: center.x, y: center.y + 0.35, color: "#fb7185", radius: 0.2 },
        { x: center.x - 0.25, y: center.y - 0.3, color: "#fde047", radius: 0.12 },
        { x: center.x + 0.25, y: center.y + 0.3, color: "#fde047", radius: 0.12 }
      ];
      startBtn.disabled = true;
      statusEl.textContent = `Game over - snake exploded. You ate ${score} dot${score === 1 ? "" : "s"}. Press Restart to try again.`;
      statusEl.classList.add("dead");
      draw();

      if (qualifiesForLeaderboard(score)) {
        pendingLeaderboardPromptTimer = setTimeout(() => {
          pendingLeaderboardPromptTimer = null;
          if (isGameOver && !leaderboardPromptOpen) {
            submitLeaderboardEntry(score);
          }
        }, 1000);
      }
    }

    function setDirection(x, y) {
      if (isGameOver) {
        return;
      }
      if (!running) {
        startGame();
      }
      const candidate = { x, y };
      const baseDirection =
        directionQueue.length > 0
          ? directionQueue[directionQueue.length - 1]
          : dir;
      const reversing = baseDirection.x === -candidate.x && baseDirection.y === -candidate.y;
      const duplicate = baseDirection.x === candidate.x && baseDirection.y === candidate.y;
      if (reversing || duplicate) return;
      directionQueue.push(candidate);
      if (directionQueue.length > 3) {
        directionQueue.shift();
      }
    }

    window.addEventListener("keydown", (event) => {
      if (event.target === nameModalInputEl || event.target === chatInputEl || leaderboardPromptOpen) {
        return;
      }
      const key = event.key.toLowerCase();
      if (["arrowup", "arrowdown", "arrowleft", "arrowright", "w", "a", "s", "d"].includes(key)) {
        event.preventDefault();
      }
      if (key === "arrowup" || key === "w") setDirection(0, -1);
      if (key === "arrowdown" || key === "s") setDirection(0, 1);
      if (key === "arrowleft" || key === "a") setDirection(-1, 0);
      if (key === "arrowright" || key === "d") setDirection(1, 0);
    });

    startBtn.addEventListener("click", startGame);
    restartBtn.addEventListener("click", setupGame);
    chatFormEl.addEventListener("submit", (event) => {
      event.preventDefault();
      const text = chatInputEl.value;
      submitChatMessage(text);
      chatInputEl.value = "";
    });

    best = 0;
    firebaseLeaderboardRef = null;
    firebaseChatRef = null;
    leaderboardEntries = [];
    chatMessages = [];
    pendingLeaderboardPromptTimer = null;
    leaderboardPromptOpen = false;
    renderLeaderboard();
    renderChatMessages();
    initializeBestScore();
    setupGame();
  </script>
</body>
</html>
